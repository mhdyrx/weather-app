<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <script defer src="script.js"></script>
  </head>
  <body>
    <main class="container">
      <section class="section-search">
        <div class="search-wrapper">
          <input
            class="search-input"
            type="text"
            spellcheck="false"
            placeholder="Enter the city name"
          />
          <div class="search-suggestions hidden">
            <div class="favorites-list"></div>
          </div>
        </div>

        <button class="search-button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
            />
          </svg>
        </button>
      </section>
      <section class="section-displays">
        <div class="display-weather">
          <button class="favorite-button"></button>
          <img
            class="display-weather-icon"
            src="node_modules/@meteocons/svg/fill/clear-night.svg"
            alt="Weather condition svg"
          />

          <h1 class="display-city-name">Madagascar</h1>
          <p class="display-degree">13°C</p>
          <div class="display-more-details">
            <div class="details-box">
              <img
                class="display-more-details-icons"
                src="node_modules/@meteocons/svg/fill/wind.svg"
                alt=""
              />
              <p class="display-more-details-desc-wind">5.2 km/h</p>
            </div>
            <div class="details-box">
              <img
                class="display-more-details-icons"
                src="node_modules/@meteocons/svg/fill/humidity.svg"
                alt=""
              />
              <p class="display-more-details-desc-humidity">72%</p>
            </div>
          </div>
        </div>
        <div class="display-spinner">
          <svg
            fill="#93bfcf"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle cx="12" cy="12" r="0">
              <animate
                id="spinner_0Nme"
                begin="0;spinner_ITag.begin+0.4s"
                attributeName="r"
                calcMode="spline"
                dur="1.2s"
                values="0;11"
                keySplines=".52,.6,.25,.99"
                fill="freeze"
              />
              <animate
                begin="0;spinner_ITag.begin+0.4s"
                attributeName="opacity"
                calcMode="spline"
                dur="1.2s"
                values="1;0"
                keySplines=".52,.6,.25,.99"
                fill="freeze"
              />
            </circle>
            <circle cx="12" cy="12" r="0">
              <animate
                id="spinner_f83A"
                begin="spinner_0Nme.begin+0.4s"
                attributeName="r"
                calcMode="spline"
                dur="1.2s"
                values="0;11"
                keySplines=".52,.6,.25,.99"
                fill="freeze"
              />
              <animate
                begin="spinner_0Nme.begin+0.4s"
                attributeName="opacity"
                calcMode="spline"
                dur="1.2s"
                values="1;0"
                keySplines=".52,.6,.25,.99"
                fill="freeze"
              />
            </circle>
            <circle cx="12" cy="12" r="0">
              <animate
                id="spinner_ITag"
                begin="spinner_0Nme.begin+0.8s"
                attributeName="r"
                calcMode="spline"
                dur="1.2s"
                values="0;11"
                keySplines=".52,.6,.25,.99"
                fill="freeze"
              />
              <animate
                begin="spinner_0Nme.begin+0.8s"
                attributeName="opacity"
                calcMode="spline"
                dur="1.2s"
                values="1;0"
                keySplines=".52,.6,.25,.99"
                fill="freeze"
              />
            </circle>
          </svg>
        </div>
        <div class="display-error">
          <img src="node_modules/@meteocons/svg/fill/code-orange.svg" alt="" />
          <p class="error-desc"></p>
        </div>
      </section>
    </main>
  </body>
</html>

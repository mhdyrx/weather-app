<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <script defer src="script.js"></script>
  </head>
  <body>
    <main class="container">
      <section class="section-search">
        <input
          class="search-input"
          type="text"
          spellcheck="false"
          placeholder="Enter the city name"
        />
        <button class="search-button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
            />
          </svg>
        </button>
      </section>
      <section class="section-display">
        <button class="favorite-button"></button>
        <img
          class="display-weather-icon"
          src="node_modules/@meteocons/svg/fill/clear-night.svg"
          alt="Weather condition svg"
        />

        <h1 class="display-city-name">Madagascar</h1>
        <p class="display-degree">13°C</p>
        <div class="display-more-details">
          <div class="details-box">
            <img
              class="display-more-details-icons"
              src="node_modules/@meteocons/svg/fill/wind.svg"
              alt=""
            />
            <p class="display-more-details-desc-wind">5.2 km/h</p>
          </div>
          <div class="details-box">
            <img
              class="display-more-details-icons"
              src="node_modules/@meteocons/svg/fill/humidity.svg"
              alt=""
            />
            <p class="display-more-details-desc-humidity">72%</p>
          </div>
        </div>
      </section>
      <section class="spinner">
        <svg
          fill="#93bfcf"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12,23a9.63,9.63,0,0,1-8-9.5,9.51,9.51,0,0,1,6.79-9.1A1.66,1.66,0,0,0,12,2.81h0a1.67,1.67,0,0,0-1.94-1.64A11,11,0,0,0,12,23Z"
          >
            <animateTransform
              attributeName="transform"
              type="rotate"
              dur="0.75s"
              values="0 12 12;360 12 12"
              repeatCount="indefinite"
            />
          </path>
        </svg>
      </section>
    </main>
  </body>
</html>
